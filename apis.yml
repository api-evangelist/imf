apis:
  - name: IMF SDMX 3.0 Data API
    description: The IMF SDMX 3.0 Data API provides programmatic access to hundreds of IMF statistical datasets including International Financial Statistics (IFS), World Economic Outlook (WEO), Fiscal Monitor (FM), Government Finance Statistics (GFS), Monetary and Financial Statistics (MFS), Balance of Payments (BOP), and more. No authentication is required for public data access.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://data.imf.org/
    baseURL: https://api.imf.org/external/sdmx/3.0
    tags:
      - Financial Data
      - Economic Indicators
      - SDMX
      - International Finance
